<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Theatre Lunch Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 650px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
    }

    h1 {
      color: #1d3557;
      text-align: center;
      margin-top: 0;
    }

    #userDisplay {
      text-align: center;
      font-weight: bold;
      color: #1d3557;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
      color: #333;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
    }

    input,
    select {
      border: 1px solid #ccc;
      outline: none;
      background: white;
    }

    input:focus,
    select:focus {
      border-color: #1d3557;
    }

    button {
      margin-top: 18px;
      background: #1d3557;
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.12s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.16);
      font-weight: bold;
    }

    button:hover {
      background: #16324f;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.25);
    }

    .logout {
      background: #991b1b;
    }

    .logout:hover {
      background: #7f1d1d;
    }

    #message {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Theatre Lunch Tracker</h1>

    <p id="userDisplay"></p>

    <button type="button" class="logout" id="logoutBtn">Logout</button>

    <form id="lunchForm">

      <label for="theatre">Theatre</label>
      <select id="theatre" required>
        <option value="">Select Theatre</option>
        <option value="T1">T1</option>
        <option value="T2">T2</option>
        <option value="T3">T3</option>
        <option value="T4">T4</option>
        <option value="T5">T5</option>
      </select>

      <label for="date">Date</label>
      <input type="date" id="date" required />

      <label for="role">Role</label>
      <select id="role" required>
        <option value="">Select Role</option>
      </select>

      <label for="lunchOut">Lunch Out</label>
      <input type="time" id="lunchOut" required />

      <label for="lunchIn">Lunch In</label>
      <input type="time" id="lunchIn" required />

      <button type="submit">Save</button>

    </form>

    <p id="message"></p>
  </div>

  <script>
    const API = "https://paarltheatrewebapp-github-io.onrender.com";

    const currentUser = localStorage.getItem("user");

    if (!currentUser) {
      window.location.href = "index.html";
    }

    const userDisplay = document.getElementById("userDisplay");
    const lunchForm = document.getElementById("lunchForm");
    const theatreSelect = document.getElementById("theatre");
    const roleSelect = document.getElementById("role");
    const dateInput = document.getElementById("date");
    const lunchOutInput = document.getElementById("lunchOut");
    const lunchInInput = document.getElementById("lunchIn");
    const messageBox = document.getElementById("message");
    const logoutBtn = document.getElementById("logoutBtn");

    userDisplay.innerText = "Logged in as: " + currentUser;

    const roleMap = {
      T1: ["Anaesthetist", "Nursing", "Scrub sister", "Gynaecologist"],
      T2: ["Anaesthetist", "Nursing", "Scrub sister", "Surgeon"],
      T3: ["Anaesthetist", "Nursing", "Scrub sister", "Gyno/Ortho/Dentist"],
      T4: ["Anaesthetist", "Nursing", "Scrub sister", "Orthopaedic Surgeon"],
      T5: ["Anaesthetist", "Nursing", "Scrub sister", "Opthalmologist/Ortho/ENT"]
    };

    theatreSelect.addEventListener("change", function () {
      const selectedTheatre = theatreSelect.value;

      roleSelect.innerHTML = '<option value="">Select Role</option>';

      if (roleMap[selectedTheatre]) {
        roleMap[selectedTheatre].forEach(function (roleName) {
          const option = document.createElement("option");
          option.value = roleName;
          option.textContent = roleName;
          roleSelect.appendChild(option);
        });
      }
    });

    lunchForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const payload = {
        username: currentUser,
        theatre: theatreSelect.value,
        date: dateInput.value,
        role: roleSelect.value,
        lunchOut: lunchOutInput.value,
        backIn: lunchInInput.value
      };

      try {
        const response = await fetch(API + "/api/lunch-entry", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          messageBox.innerText = "Saved successfully ✅";
          messageBox.style.color = "green";

          lunchForm.reset();
          roleSelect.innerHTML = '<option value="">Select Role</option>';
        } else {
          messageBox.innerText = data.message || "Could not save ❌";
          messageBox.style.color = "red";
        }

      } catch (error) {
        messageBox.innerText = "Server error. Could not save ❌";
        messageBox.style.color = "red";
      }
    });

    logoutBtn.addEventListener("click", function () {
      localStorage.removeItem("user");
      localStorage.removeItem("admin");
      window.location.href = "index.html";
    });
  </script>

</body>
</html>
