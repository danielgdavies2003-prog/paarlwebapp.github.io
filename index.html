<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theatre Lunch Tracker</title>

<style>
body { font-family: Arial; background: #f4f6f8; }

.container {
  max-width: 700px;
  margin: 40px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

input, select, button {
  padding: 10px;
  margin: 8px 0;
  width: 100%;
}

button {
  background: #1d3557;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  margin-top: 20px;
  background: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>Theatre Lunch Tracker</h1>

  <!-- USER LOGIN -->
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <p id="loggedUser"></p>

  <!-- FORM -->
  <form id="lunchForm">
    <select id="theatre" required>
      <option value="">Select theatre</option>
      <option value="T1">T1</option>
      <option value="T2">T2</option>
      <option value="T3">T3</option>
      <option value="T4">T4</option>
      <option value="T5">T5</option>
    </select>

    <input type="date" id="date" required>

    <select id="role" required>
      <option value="">Select role</option>
    </select>

    <input type="time" id="lunchOut" required>
    <input type="time" id="backIn" required>

    <button type="submit">Save Lunch Times</button>
  </form>

  <p id="message"></p>

  <hr>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
  <button onclick="logout()">Logout</button>
  <button onclick="downloadExcel()">Download Excel</button>
</div>

<h3>My Entries</h3>
<button onclick="loadEntries()">Load My Entries</button>

<table border="1" width="100%">
<thead>
<tr>
  <th>Date</th>
  <th>Theatre</th>
  <th>Role</th>
  <th>Lunch Out</th>
  <th>Back In</th>
</tr>
</thead>
<tbody id="entriesTable"></tbody>
</table>

<script>
const API = "https://paarltheatrewebapp-github-io.onrender.com";

// ✅ Load user from storage
let currentUser = localStorage.getItem("user") || "";

const theatre = document.getElementById("theatre");
const role = document.getElementById("role");
const message = document.getElementById("message");

// ✅ Role mapping
const roleMap = {
  T1: ["Anaesthetist", "Nursing", "Scrub sister", "Gynaecologist"],
  T2: ["Anaesthetist", "Nursing", "Scrub sister", "Surgeon"],
  T3: ["Anaesthetist", "Nursing", "Scrub sister", "Gyno/Ortho/Dentist"],
  T4: ["Anaesthetist", "Nursing", "Scrub sister", "Orthopaedic Surgeon"],
  T5: ["Anaesthetist", "Nursing", "Scrub sister", "Opthalmologist/Ortho/ENT"]
};

// ✅ Update user display
function updateUserDisplay() {
  document.getElementById("loggedUser").innerText =
    currentUser ? "Logged in as: " + currentUser : "Not logged in";
}
updateUserDisplay();

// ✅ Update roles dropdown
theatre.addEventListener("change", () => {
  role.innerHTML = '<option value="">Select role</option>';
  roleMap[theatre.value]?.forEach(r => {
    let opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    role.appendChild(opt);
  });
});

// ✅ Save form
document.getElementById("lunchForm").addEventListener("submit", async e => {
  e.preventDefault();

  if (!currentUser) {
    alert("Login first ❌");
    return;
  }

  const payload = {
    username: currentUser,
    theatre: theatre.value,
    date: document.getElementById("date").value,
    role: role.value,
    lunchOut: document.getElementById("lunchOut").value,
    backIn: document.getElementById("backIn").value
  };

  try {
    const res = await fetch(API + "/api/lunch-entry", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    message.innerText = data.message;
    message.style.color = "green";

    loadEntries(); // ✅ auto refresh table

  } catch {
    message.innerText = "Error saving";
    message.style.color = "red";
  }
});

// ✅ Register
async function register() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  alert(res.ok ? "Registered ✅" : data.error);
}

// ✅ Login
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (res.ok) {
    currentUser = username;
    localStorage.setItem("user", username);
    updateUserDisplay();
    alert("Login success ✅");
    loadEntries(); // ✅ load automatically
  } else {
    alert(data.error);
  }
}

// ✅ Logout
function logout() {
  localStorage.removeItem("user");
  currentUser = "";
  updateUserDisplay();
}

// ✅ Load entries
async function loadEntries() {
  if (!currentUser) return;

  const res = await fetch(API + "/api/my-entries/" + currentUser);
  const data = await res.json();

  const table = document.getElementById("entriesTable");
  table.innerHTML = "";

  data.forEach(e => {
    table.innerHTML += `
      <tr>
        <td>${e.date}</td>
        <td>${e.theatre}</td>
        <td>${e.role}</td>
        <td>${e.lunch_out}</td>
        <td>${e.back_in}</td>
      </tr>
    `;
  });
}

// ✅ Download Excel
function downloadExcel() {
  window.open(API + "/export-excel");
}

// ✅ Auto load on page refresh
if (currentUser) loadEntries();

</script>

</body>
</html>
