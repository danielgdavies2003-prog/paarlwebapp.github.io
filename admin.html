<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Theatre Tracker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    h1 {
      color: #1d3557;
      margin-top: 0;
      text-align: center;
    }

    p {
      text-align: center;
      font-weight: bold;
    }

    button {
      padding: 12px;
      width: 100%;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: #1d3557;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.12s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.16);
    }

    button:hover {
      background: #16324f;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.95);
      box-shadow: inset 0 4px 8px rgba(0,0,0,0.25);
    }

    .danger {
      background: #991b1b;
    }

    .danger:hover {
      background: #7f1d1d;
    }

    .denied {
      max-width: 500px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }
  </style>
</head>

<body>

  <div class="container" id="adminBox">
    <h1>Admin Panel</h1>

    <p id="status">Checking admin access...</p>

    <button onclick="downloadExcel()">Download Excel</button>
    <button onclick="goToApp()">Go to App</button>
    <button class="danger" onclick="logout()">Logout</button>
  </div>

  <script>
    const API = "https://paarltheatrewebapp-github-io.onrender.com";

    const user = localStorage.getItem("user");

    if (!user) {
      window.location.href = "index.html";
    }

    async function checkAdminAccess() {
      try {
        const res = await fetch(API + "/api/admin-check?username=" + encodeURIComponent(user));
        const data = await res.json();

        if (!data.isAdmin) {
          document.body.innerHTML = `
            <div class="denied">
              <h2>Access denied ❌</h2>
              <p>You do not have permission to view this page.</p>
              app.htmlGo Back</button>
            </div>
          `;
          return;
        }

        document.getElementById("status").innerText = "Logged in as admin: " + user;

      } catch (err) {
        document.body.innerHTML = `
          <div class="denied">
            <h2>Server error ❌</h2>
            <p>Could not verify admin access.</p>
            index.htmlBack to Login</button>
          </div>
        `;
      }
    }

    function downloadExcel() {
      window.open(API + "/export-excel?username=" + encodeURIComponent(user));
    }

    function goToApp() {
      window.location.href = "app.html";
    }

    function logout() {
      localStorage.removeItem("user");
      localStorage.removeItem("admin");
      window.location.href = "index.html";
    }
function downloadExcel() {
  window.open(API + "/export-excel?username=" + encodeURIComponent(user));
}
    checkAdminAccess();
  </script>

</body>
</html>
