<!DOCTYPE html>
<html>
<head>
<title>Theatre Lunch Tracker</title>

<style>
body { font-family: Arial; background: #f4f6f8; }

.container {
  max-width: 600px;
  margin: 40px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

input, select, button {
  padding: 10px;
  margin: 8px 0;
  width: 100%;
}

button {
  background: #1d3557;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>Theatre Tracker</h1>
  <p id="user"></p>

  <button onclick="logout()">Logout</button>

  <form id="form">
    <label>Theatre</label>
    <select id="theatre">
      <option value="">Select Theatre</option>
      <option>T1</option>
      <option>T2</option>
      <option>T3</option>
      <option>T4</option>
      <option>T5</option>
    </select>

    <label>Date</label>
    <input type="date" id="date">

    <label>Role</label>
    <select id="role"></select>

    <label>Lunch Out</label>
    <input type="time" id="lunchOut">

    <label>Lunch In</label>
    <input type="time" id="lunchIn">

    <button type="submit">Save & Download Excel</button>
  </form>

</div>

<script>
const API = "https://paarltheatrewebapp-github-io.onrender.com";

let user = localStorage.getItem("user");
if (!user) window.location.href = "index.html";

document.getElementById("user").innerText = "Logged in: " + user;

// ✅ FIXED VARIABLES
const form = document.getElementById("form");
const theatre = document.getElementById("theatre");
const role = document.getElementById("role");
const date = document.getElementById("date");
const lunchOut = document.getElementById("lunchOut");
const lunchIn = document.getElementById("lunchIn");

// roles
const roles = {
T1:["Anaesthetist","Nursing","Scrub sister","Gynaecologist"],
T2:["Anaesthetist","Nursing","Scrub sister","Surgeon"],
T3:["Anaesthetist","Nursing","Scrub sister","Gyno/Ortho/Dentist"],
T4:["Anaesthetist","Nursing","Scrub sister","Orthopaedic Surgeon"],
T5:["Anaesthetist","Nursing","Scrub sister","Opthalmologist/Ortho/ENT"]
};

theatre.onchange = () => {
  role.innerHTML="";
  roles[theatre.value]?.forEach(r=>{
    const o=document.createElement("option");
    o.text=r;
    role.add(o);
  });
};

// ✅ SAVE + DOWNLOAD
form.onsubmit = async e => {
  e.preventDefault();

  await fetch(API+"/api/lunch-entry",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user,
      theatre:theatre.value,
      date:date.value,
      role:role.value,
      lunchOut:lunchOut.value,
      backIn:lunchIn.value
    })
  });

  // ✅ DOWNLOAD EXCEL AFTER SAVE
  window.open(API + "/export-excel");
};

function logout(){
  localStorage.removeItem("user");
  window.location.href="index.html";
}
</script>

</body>
</html>
