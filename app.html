<!DOCTYPE html>
<html>
<head>
<title>Theatre Lunch Tracker</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

/* Container */
.container {
  max-width: 600px;
  margin: 40px auto;
  background: white;
  padding: 24px;
  border-radius: 12px;
}

/* Inputs */
input, select, button {
  padding: 10px;
  margin: 8px 0;
  width: 100%;
  font-size: 14px;
}

/* Buttons (FULL EFFECTS) */
button {
  background: #1d3557;
  color: white;
  border: none;
  cursor: pointer;
  transition: all 0.1s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

/* Hover */
button:hover {
  background: #16324f;
}

/* Click / press */
button:active {
  transform: scale(0.95);
  box-shadow: inset 0 4px 6px rgba(0,0,0,0.2);
}

/* Labels */
label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}
</style>
</head>

<body>

<div class="container">
  <h1>Theatre Lunch Tracker</h1>

  <p id="user"></p>

  <button onclick="logout()">Logout</button>

  <form id="form">

    <label>Theatre</label>
    <select id="theatre">
      <option value="">Select Theatre</option>
      <option>T1</option>
      <option>T2</option>
      <option>T3</option>
      <option>T4</option>
      <option>T5</option>
    </select>

    <label>Date</label>
    <input type="date" id="date">

    <label>Role</label>
    <select id="role"></select>

    <label>Lunch Out</label>
    <input type="time" id="lunchOut">

    <label>Lunch In</label>
    <input type="time" id="lunchIn">

    <button type="submit">Save & Download Excel</button>

  </form>

</div>

<script>
const API = "https://paarltheatrewebapp-github-io.onrender.com";

// ✅ Get logged user
let user = localStorage.getItem("user");

// Redirect if not logged in
if (!user) {
  window.location.href = "index.html";
}

// Show user
document.getElementById("user").innerText = "Logged in: " + user;

// ✅ Get elements
const form = document.getElementById("form");
const theatre = document.getElementById("theatre");
const role = document.getElementById("role");
const date = document.getElementById("date");
const lunchOut = document.getElementById("lunchOut");
const lunchIn = document.getElementById("lunchIn");

// ✅ Role map
const roles = {
  T1:["Anaesthetist","Nursing","Scrub sister","Gynaecologist"],
  T2:["Anaesthetist","Nursing","Scrub sister","Surgeon"],
  T3:["Anaesthetist","Nursing","Scrub sister","Gyno/Ortho/Dentist"],
  T4:["Anaesthetist","Nursing","Scrub sister","Orthopaedic Surgeon"],
  T5:["Anaesthetist","Nursing","Scrub sister","Opthalmologist/Ortho/ENT"]
};

// Populate role dropdown
theatre.onchange = () => {
  role.innerHTML = "";
  roles[theatre.value]?.forEach(r => {
    const option = document.createElement("option");
    option.text = r;
    role.add(option);
  });
};

// ✅ SAVE + DOWNLOAD
form.onsubmit = async e => {
  e.preventDefault();

  await fetch(API + "/api/lunch-entry", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: user,
      theatre: theatre.value,
      date: date.value,
      role: role.value,
      lunchOut: lunchOut.value,
      backIn: lunchIn.value
    })
  });

  // ✅ Force Excel download
  const link = document.createElement("a");
  link.href = API + "/export-excel";
  link.download = "lunch.xlsx";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

// ✅ Logout
function logout() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
