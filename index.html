<!DOCTYPE html>
<html>
<head>
<title>Login - Theatre Tracker</title>

<style>
body {
  font-family: Arial;
  background: #1d3557;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  width: 300px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
button {
  background: #1d3557;
  color: white;
  border: none;
}
.switch {
  color: blue;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="title">Register</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="submit()">Submit</button>

  <p>
    <span id="switchText">Already have an account?</span>
    <span class="switch" onclick="toggle()">Login</span>
  </p>

  <p id="msg"></p>
</div>

<script>
const API = "https://paarltheatrewebapp-github-io.onrender.com";

let isRegister = true;

function toggle() {
  isRegister = !isRegister;
  document.getElementById("title").innerText = isRegister ? "Register" : "Login";
  document.getElementById("switchText").innerText =
    isRegister ? "Already have an account?" : "Need an account?";
}

async function submit() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const route = isRegister ? "/register" : "/login";

  const res = await fetch(API + route, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("user", username);
    window.location.href = "app.html"; // ✅ redirect
  } else {
    document.getElementById("msg").innerText = data.error;
  }
}
</script>

</body>
</html>
